@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

@keyframes ripple{from{transform:scale(0);opacity:.6}to{transform:scale(3);opacity:0}}
@keyframes typewriter{from{width:0}to{width:100%}}
.fade-in{animation:fadeIn .4s ease both}
.fade-up{animation:fadeUp .4s ease both}
.scale-in{animation:scaleIn .35s ease both}
.slide-up{animation:slideUp .32s cubic-bezier(.32,.72,0,1) both}
.float{animation:float 3s ease-in-out infinite}

// SPLASH SCREEN
// ═══════════════════════════════════════════════════════════════════
function SplashScreen({onDone}){
  const[step,setStep]=useState(0);
  useEffect(()=>{
    const t1=setTimeout(()=>setStep(1),600);
    const t2=setTimeout(()=>setStep(2),1400);
    const t3=setTimeout(()=>setStep(3),2200);
    const t4=setTimeout(()=>onDone(),3200);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);clearTimeout(t4);};
  },[]);
  return(
    <div style={{height:"100vh",background:"linear-gradient(160deg,#0F2557 0%,#1a3a7a 50%,#0F2557 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
      {/* BG circles */}
      {[[200,"-40px","-40px","rgba(244,166,35,.08)"],[300,"auto","-60px","rgba(42,82,152,.3)"],[150,"30px","auto","rgba(244,166,35,.05)"]].map(([s,t,b,bg],i)=>(
        <div key={i} style={{position:"absolute",width:s,height:s,borderRadius:"50%",background:bg,top:t,bottom:b,right:i===1?"−60px":undefined,left:i===2?"30px":undefined}}/>
      ))}
      {/* Logo */}
      <div style={{animation:"float 3s ease-in-out infinite",marginBottom:24}}>
        <div style={{width:90,height:90,borderRadius:28,background:"linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.05))",border:"1.5px solid rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:44,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>🧠</div>
      </div>
      <div style={{opacity:step>=1?1:0,transform:step>=1?"translateY(0)":"translateY(10px)",transition:"all .5s ease",textAlign:"center",marginBottom:8}}>
        <h1 style={{fontSize:32,fontWeight:900,color:"#fff",letterSpacing:-1,margin:0}}>Smart<span style={{color:"#F4A623"}}>Savior</span></h1>
      </div>
      <div style={{opacity:step>=2?1:0,transform:step>=2?"translateY(0)":"translateY(8px)",transition:"all .5s ease .1s",textAlign:"center",marginBottom:40}}>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:13,margin:0,fontWeight:500}}>Solusi Cerdas Kulkas Anda</p>
      </div>
      {step>=3&&<div style={{display:"flex",gap:6}}>
        {[0,1,2].map(i=><div key={i} style={{width:i===1?20:6,height:6,borderRadius:3,background:i===1?"#F4A623":"rgba(255,255,255,.3)",transition:"all .3s"}}/>)}
      </div>}
      <p style={{position:"absolute",bottom:30,color:"rgba(255,255,255,.3)",fontSize:11,fontWeight:600}}>Kelompok Batmen · Binus University</p>
    </div>
  );
}

// AUTH SCREEN (LOGIN / REGISTER)
// ═══════════════════════════════════════════════════════════════════
function AuthScreen({onLogin}){
  const[isLogin,setIsLogin]=useState(true);
  const[form,setForm]=useState({username:"",password:"",name:"",confirmPassword:""});
  const[showPw,setShowPw]=useState(false);
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const doLogin=()=>{
    setErr("");
    if(!form.username||!form.password){setErr("Username dan password wajib diisi");return;}
    const users=SS.get("ss_users",[]);
    const user=users.find(u=>u.username===form.username&&u.password===form.password);
    if(!user){setErr("Username atau password salah");return;}
    setLoading(true);
    setTimeout(()=>{SS.set("ss_current_user",user.username);onLogin(user);},800);
  };
  const doRegister=()=>{
    setErr("");
    if(!form.username||!form.password||!form.name){setErr("Semua field wajib diisi");return;}
    if(form.password!==form.confirmPassword){setErr("Password tidak cocok");return;}
    if(form.password.length<4){setErr("Password minimal 4 karakter");return;}
    const users=SS.get("ss_users",[]);
    if(users.find(u=>u.username===form.username)){setErr("Username sudah terdaftar");return;}
    const newUser={username:form.username,password:form.password,name:form.name,email:"",phone:"",dob:"",photo:null,fridgeType:"2",onboardingDone:false,createdAt:new Date().toISOString()};
    SS.set("ss_users",[...users,newUser]);
    SS.set("ss_current_user",form.username);
    setLoading(true);
    setTimeout(()=>onLogin(newUser),800);
  };

  const inp={width:"100%",border:"1.5px solid rgba(255,255,255,.15)",borderRadius:12,padding:"12px 14px",fontSize:14,outline:"none",color:"#fff",background:"rgba(255,255,255,.08)",fontFamily:"inherit"};

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0F2557,#1a3a7a 60%,#0F2557)",display:"flex",flexDirection:"column",padding:"0 0 40px"}}>
      {/* Header */}
      <div style={{padding:"60px 24px 30px",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>🧠</div>
        <h1 style={{color:"#fff",fontSize:26,fontWeight:900,margin:"0 0 6px",letterSpacing:-.5}}>Smart<span style={{color:"#F4A623"}}>Savior</span></h1>
        <p style={{color:"rgba(255,255,255,.55)",fontSize:13,margin:0}}>Kelola kulkas Anda dengan cerdas</p>
      </div>

      {/* Tab Switch */}
      <div style={{margin:"0 24px 24px",background:"rgba(255,255,255,.08)",borderRadius:14,padding:4,display:"flex"}}>
        {["Masuk","Daftar"].map((l,i)=>(
          <button key={l} onClick={()=>{setIsLogin(i===0);setErr("");}} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:(i===0&&isLogin)||(i===1&&!isLogin)?"#fff":"none",color:(i===0&&isLogin)||(i===1&&!isLogin)?"#0F2557":"rgba(255,255,255,.6)",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all .2s"}}>{l}</button>
        ))}
      </div>

      {/* Form */}
      <div style={{padding:"0 24px",flex:1}}>
        {!isLogin&&<div style={{marginBottom:14}}>
          <p style={{color:"rgba(255,255,255,.7)",fontSize:12,fontWeight:700,marginBottom:6}}>Nama Lengkap</p>
          <input placeholder="Nama kamu" value={form.name} onChange={set("name")} style={inp}/>
        </div>}
        <div style={{marginBottom:14}}>
          <p style={{color:"rgba(255,255,255,.7)",fontSize:12,fontWeight:700,marginBottom:6}}>Username</p>
          <input placeholder="Masukkan username" value={form.username} onChange={set("username")} style={inp} autoCapitalize="none"/>
        </div>
        <div style={{marginBottom:14}}>
          <p style={{color:"rgba(255,255,255,.7)",fontSize:12,fontWeight:700,marginBottom:6}}>Password</p>
          <div style={{position:"relative"}}>
            <input type={showPw?"text":"password"} placeholder="Masukkan password" value={form.password} onChange={set("password")} style={{...inp,paddingRight:46}}/>
            <button onClick={()=>setShowPw(p=>!p)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,.5)"}}>{showPw?<Ic.EyeOff/>:<Ic.Eye/>}</button>
          </div>
        </div>
        {!isLogin&&<div style={{marginBottom:14}}>
          <p style={{color:"rgba(255,255,255,.7)",fontSize:12,fontWeight:700,marginBottom:6}}>Konfirmasi Password</p>
          <input type="password" placeholder="Ulangi password" value={form.confirmPassword} onChange={set("confirmPassword")} style={inp}/>
        </div>}
        {err&&<div style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
          <p style={{color:"#FCA5A5",fontSize:12,margin:0,fontWeight:600}}>⚠️ {err}</p>
        </div>}
        <button onClick={isLogin?doLogin:doRegister} disabled={loading} style={{width:"100%",background:loading?"rgba(244,166,35,.5)":"linear-gradient(135deg,#F4A623,#FBBF47)",border:"none",borderRadius:14,padding:"14px",color:loading?"rgba(255,255,255,.7)":"#0F2557",fontWeight:900,fontSize:15,cursor:loading?"not-allowed":"pointer",marginTop:8,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {loading?<><div style={{width:16,height:16,borderRadius:"50%",border:"2px solid #0F2557",borderTopColor:"transparent",animation:"spin .7s linear infinite"}}/> Memproses...</>:(isLogin?"Masuk ke SmartSavior 🚀":"Buat Akun Sekarang 🎉")}
        </button>
        {isLogin&&<p style={{textAlign:"center",color:"rgba(255,255,255,.4)",fontSize:12,marginTop:16}}>Belum punya akun? <button onClick={()=>{setIsLogin(false);setErr("");}} style={{background:"none",border:"none",color:"#F4A623",fontWeight:700,cursor:"pointer",fontSize:12}}>Daftar sekarang</button></p>}
      </div>
    </div>
  );
}

              <span style={{color:"#F4A623",fontWeight:700,fontSize:13}}>{v}</span>
            </div>
          ))}
        </div>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginBottom:28,lineHeight:1.6}}>SmartSavior siap membantu kamu mengelola stok kulkas dengan lebih cerdas!</p>
        <button onClick={()=>onDone(data)} style={btnW}>Mulai Gunakan SmartSavior 🚀</button>
      </div>
    ),
  ];

  const btnW={width:"100%",background:"linear-gradient(135deg,#F4A623,#FBBF47)",border:"none",borderRadius:14,padding:"14px",color:"#0F2557",fontWeight:900,fontSize:15,cursor:"pointer"};
  const btnOutline={background:"rgba(255,255,255,.1)",border:"1.5px solid rgba(255,255,255,.2)",borderRadius:14,padding:"14px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",flex:1};

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0F2557,#1a3a7a 60%,#0F2557)",padding:"52px 22px 40px"}}>
      {/* Progress */}
      <div style={{display:"flex",gap:4,marginBottom:32}}>
        {[0,1,2,3].map(i=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?"#F4A623":"rgba(255,255,255,.15)",transition:"background .3s"}}/>)}
      </div>
      {STEPS[step]&&STEPS[step]()}
    </div>
  );
}

// MY STORAGE MODAL
// ═══════════════════════════════════════════════════════════════════
function StorageModal({stock,setStock,C,settings,sections,onClose}){
  const[addEdit,setAddEdit]=useState(null);
  const[filter,setFilter]=useState("all");
  const[search,setSearch]=useState("");
  const[secView,setSecView]=useState(false);
  const warnDays=settings.warnDays||7;
  const cats=["all",...new Set(stock.map(i=>i.category))];
  const filtered=stock
    .filter(i=>filter==="all"||i.category===filter)
    .filter(i=>i.name.toLowerCase().includes(search.toLowerCase()));
  const lowStock=stock.filter(i=>i.qty<=2&&i.qty>0);

  return(
    <div style={{position:"fixed",inset:0,background:C.overlay,zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div className="slide-up" style={{background:C.bg,borderRadius:"24px 24px 0 0",width:"100%",maxHeight:"93vh",overflowY:"auto"}}>
        <div style={{background:`linear-gradient(135deg,${C.navy},${C.navyL})`,padding:"18px 16px 14px",borderRadius:"24px 24px 0 0",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <Ic.Fridge/><h2 style={{color:"#fff",margin:0,fontSize:17,fontWeight:800}}>My Storage</h2>
              <span style={{background:"rgba(255,255,255,.2)",color:"#fff",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>{stock.length}</span>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setSecView(p=>!p)} style={{background:secView?"#F4A623":"rgba(255,255,255,.15)",border:"none",borderRadius:10,padding:"6px 10px",color:secView?"#0F2557":"#fff",fontWeight:700,cursor:"pointer",fontSize:11}}>🧊 Sekat</button>
              <button onClick={()=>setAddEdit("add")} style={{background:"#F4A623",border:"none",borderRadius:10,padding:"6px 12px",color:"#0F2557",fontWeight:700,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:4}}><Ic.Plus/>Tambah</button>
              <button onClick={onClose} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:10,padding:8,cursor:"pointer",color:"#fff"}}><Ic.Close/></button>
            </div>
          </div>
          <div style={{background:"rgba(255,255,255,.12)",borderRadius:10,display:"flex",alignItems:"center",gap:8,padding:"8px 12px",marginBottom:10}}>
            <Ic.Search/><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cari stok..." style={{background:"none",border:"none",outline:"none",color:"#fff",fontSize:13,flex:1,fontFamily:"inherit"}}/>
          </div>
          {!secView&&<div style={{display:"flex",gap:7,overflowX:"auto"}}>
            {cats.map(c=><button key={c} onClick={()=>setFilter(c)} style={{background:filter===c?"#F4A623":"rgba(255,255,255,.15)",border:"none",borderRadius:20,padding:"4px 12px",color:filter===c?"#0F2557":"#fff",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>{c==="all"?"Semua":c}</button>)}
          </div>}
        </div>

        <div style={{padding:"12px 14px 100px"}}>
          {lowStock.length>0&&<div style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:14,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            <Ic.Warn/><div><p style={{margin:0,fontWeight:700,fontSize:12,color:"#92400E"}}>Stok Hampir Habis!</p><p style={{margin:0,fontSize:11,color:"#B45309"}}>{lowStock.map(i=>i.name).join(", ")}</p></div>
          </div>}

          {secView
            ? sections.map(sec=>{
                const items=stock.filter(i=>i.section===sec);
                return(
                  <div key={sec} style={{marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <span style={{fontSize:16}}>{sec.split(" ")[0]}</span>
                      <h3 style={{margin:0,fontSize:14,fontWeight:800,color:C.text,flex:1}}>{sec.slice(sec.indexOf(" ")+1)}</h3>
                      <span style={{background:`${C.navy}15`,color:C.navy,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>{items.length} item</span>
                    </div>
                    {items.length===0
                      ?<div style={{background:C.card,borderRadius:12,padding:"12px",textAlign:"center",color:C.muted,fontSize:12,border:`1.5px dashed ${C.border}`}}>Sekat kosong</div>
                      :items.map(item=>{
                        const days=daysDiff(item.expiryDate);
                        const st=expStatus(days,warnDays,C);
                        return(
                          <div key={item.id} style={{background:C.card,borderRadius:12,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,marginBottom:6,border:`1.5px solid ${days<=3?st.color+"40":C.border}`}}>
                            <span style={{fontSize:24}}>{item.photo}</span>
                            <div style={{flex:1,minWidth:0}}>
                              <p style={{margin:"0 0 1px",fontWeight:700,fontSize:12,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</p>
                              <p style={{margin:0,fontSize:11,color:C.muted}}>{item.qty} {item.unit}</p>
                            </div>
                            <span style={{background:st.bg,color:st.color,borderRadius:20,padding:"2px 7px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{st.label}</span>
                          </div>
                        );
                      })
                    }
                  </div>
                );
              })
            : filtered.length===0
              ?<div style={{textAlign:"center",padding:"40px 20px",color:C.muted}}><div style={{fontSize:44}}>📦</div><p style={{fontWeight:700,margin:"12px 0 4px",color:C.text}}>Belum ada stok</p><p style={{fontSize:12}}>Tambah item atau scan barang</p></div>
              :filtered.map(item=>{
                const days=daysDiff(item.expiryDate);
                const st=expStatus(days,warnDays,C);
                return(
                  <div key={item.id} style={{background:C.card,borderRadius:16,padding:"12px 14px",boxShadow:`0 2px 10px ${C.shadow}`,border:`1.5px solid ${days<=3?st.color+"50":C.border}`,marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{display:"flex",gap:10,alignItems:"center"}}>
                        <span style={{fontSize:30}}>{item.photo}</span>
                        <div>
                          <p style={{margin:"0 0 2px",fontWeight:800,fontSize:13,color:C.text}}>{item.name}</p>
                          <p style={{margin:"0 0 2px",fontSize:11,color:C.muted}}>{item.category}</p>
                          {item.section&&<span style={{background:`${C.navy}14`,color:C.navy,borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:700}}>{item.section}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
                        <span style={{fontWeight:900,fontSize:14,color:C.navy}}>{item.qty}<span style={{fontSize:10,fontWeight:600}}> {item.unit}</span></span>
                        <span style={{background:st.bg,color:st.color,borderRadius:20,padding:"2px 7px",fontSize:10,fontWeight:700}}>{st.label}</span>
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={()=>setAddEdit(item)} style={{background:C.card2,border:"none",borderRadius:7,padding:"4px 7px",cursor:"pointer",color:C.text}}><Ic.Edit/></button>
                          <button onClick={()=>setStock(p=>p.filter(i=>i.id!==item.id))} style={{background:"#FEF2F2",border:"none",borderRadius:7,padding:"4px 7px",cursor:"pointer",color:C.red}}><Ic.Trash/></button>
                        </div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:12,marginTop:8,borderTop:`1px solid ${C.border}`,paddingTop:7}}>
                      <span style={{fontSize:10,color:C.muted}}>📅 Disimpan: {fmtDate(item.storedDate)}</span>
                      <span style={{fontSize:10,color:C.muted}}>⏰ Exp: {fmtDate(item.expiryDate)}</span>
                    </div>
                  </div>
                );
              })
          }
        </div>
      </div>
      {addEdit&&<AddEditModal item={addEdit==="add"?null:addEdit} C={C} sections={sections} defUnit={settings.defUnit} onClose={()=>setAddEdit(null)} onSave={ni=>{
        if(addEdit==="add")setStock(p=>[...p,{...ni,id:Date.now()}]);
        else setStock(p=>p.map(i=>i.id===ni.id?ni:i));
        setAddEdit(null);
      }}/>}
    </div>
  );
}

// HOME SCREEN
// ═══════════════════════════════════════════════════════════════════
function HomeScreen({stock,user,settings,C,sections,onOpenStorage,onOpenSettings,onGoProfile}){
  const[selRecipe,setSelRecipe]=useState(null);
  const[manualScroll,setManualScroll]=useState(false);
  const carRef=useRef(null);
  const msRef=useRef(null);
  const h=NOW.getHours();
  const greet=h<11?"Selamat Pagi ☀️":h<15?"Selamat Siang 🌤️":h<18?"Selamat Sore 🌇":"Selamat Malam 🌙";
  const warnDays=settings.warnDays||7;
  const expiring=stock.filter(i=>{const d=daysDiff(i.expiryDate);return d>=0&&d<=(warnDays);});
  const expired=stock.filter(i=>daysDiff(i.expiryDate)<0);
  const available=stock.filter(i=>daysDiff(i.expiryDate)>=0);
  const spd=settings.scrollSpeed==="slow"?0.5:settings.scrollSpeed==="fast"?2:1.1;

  useEffect(()=>{
    if(!settings.autoScroll||manualScroll)return;
    const el=carRef.current;if(!el)return;
    let dir=1;
    const iv=setInterval(()=>{
      el.scrollLeft+=dir*spd;
      if(el.scrollLeft>=el.scrollWidth-el.clientWidth-2)dir=-1;
      if(el.scrollLeft<=0)dir=1;
    },30);
    return()=>clearInterval(iv);
  },[settings.autoScroll,manualScroll,spd]);

  const onCarInteract=()=>{
    setManualScroll(true);clearTimeout(msRef.current);
    msRef.current=setTimeout(()=>setManualScroll(false),5000);
  };

  const dateStr=NOW.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  return(
    <div style={{paddingBottom:90,background:C.bg,minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(150deg,${C.navy} 0%,${C.navyL} 100%)`,padding:"52px 18px 22px",borderRadius:"0 0 30px 30px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,.05)"}}/>
        <div style={{position:"absolute",bottom:-20,left:-20,width:100,height:100,borderRadius:"50%",background:"rgba(255,255,255,.03)"}}/>
        <p style={{color:"rgba(255,255,255,.45)",fontSize:11,fontWeight:600,marginBottom:12,textTransform:"uppercase",letterSpacing:.8}}>{dateStr}</p>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div onClick={onGoProfile} style={{cursor:"pointer",position:"relative",flexShrink:0}}>
              {user?.photo
                ?<img src={user.photo} style={{width:50,height:50,borderRadius:"50%",objectFit:"cover",border:"2.5px solid rgba(255,255,255,.5)"}} alt="avatar"/>
                :<div style={{width:50,height:50,borderRadius:"50%",background:"rgba(255,255,255,.18)",border:"2.5px solid rgba(255,255,255,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>👤</div>
              }
              <div style={{position:"absolute",bottom:0,right:0,width:13,height:13,borderRadius:"50%",background:"#22C55E",border:`2px solid ${C.navy}`}}/>
            </div>
            <div>
              <p style={{color:"rgba(255,255,255,.6)",fontSize:11,margin:0,fontWeight:500}}>{greet}</p>
              <h2 style={{color:"#fff",fontSize:19,fontWeight:900,margin:"2px 0 0",letterSpacing:-.4,lineHeight:1.1}}>{user?.name||"Kuple"} 👋</h2>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onOpenSettings} style={{background:"rgba(255,255,255,.13)",border:"1.5px solid rgba(255,255,255,.22)",borderRadius:12,width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>
              <Ic.Settings/>
            </button>
            <button onClick={onOpenStorage} style={{background:"rgba(255,255,255,.13)",border:"1.5px solid rgba(255,255,255,.22)",borderRadius:12,padding:"0 11px",height:38,display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:"#fff"}}>
              <Ic.Fridge/><span style={{fontSize:11,fontWeight:700}}>Storage</span>
            </button>
          </div>
        </div>
        {/* Stats */}
        <div style={{display:"flex",gap:8}}>
          {[{l:"Total Stok",v:available.length,e:"📦",bg:"rgba(255,255,255,.1)"},{l:"Mau Expired",v:expiring.length,e:"⚠️",bg:"rgba(244,166,35,.18)"},{l:"Kadaluarsa",v:expired.length,e:"❌",bg:"rgba(239,68,68,.15)"}].map(s=>(
            <div key={s.l} style={{flex:1,background:s.bg,borderRadius:14,padding:"10px 6px",textAlign:"center",border:"1px solid rgba(255,255,255,.1)"}}>
              <div style={{fontSize:18}}>{s.e}</div>
              <div style={{color:"#fff",fontSize:20,fontWeight:900,lineHeight:1.1}}>{s.v}</div>
              <div style={{color:"rgba(255,255,255,.55)",fontSize:9,fontWeight:700,marginTop:1}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"14px 14px 0"}}>
        {/* Fridge Sections Preview */}
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:16}}>🧊</span><h2 style={{fontSize:14,fontWeight:800,color:C.text,margin:0}}>Isi Kulkas</h2></div>
            <button onClick={onOpenStorage} style={{background:"none",border:"none",cursor:"pointer",color:C.navyL,fontSize:12,fontWeight:700}}>Kelola →</button>
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
            {sections.slice(0,5).map(sec=>{
              const items=stock.filter(i=>i.section===sec);
              const hasWarning=items.some(i=>{const d=daysDiff(i.expiryDate);return d>=0&&d<=warnDays;});
              const hasExpired=items.some(i=>daysDiff(i.expiryDate)<0);
              return(
                <div key={sec} onClick={onOpenStorage} style={{minWidth:100,background:C.card,borderRadius:14,padding:"10px 10px",flexShrink:0,cursor:"pointer",border:`1.5px solid ${hasExpired?C.red+"40":hasWarning?C.yellow+"40":C.border}`,boxShadow:`0 2px 8px ${C.shadow}`}}>
                  <div style={{fontSize:20,marginBottom:4}}>{sec.split(" ")[0]}</div>
                  <p style={{margin:"0 0 2px",fontSize:11,fontWeight:700,color:C.text,lineHeight:1.2}}>{sec.slice(sec.indexOf(" ")+1)}</p>
                  <p style={{margin:0,fontSize:10,color:C.muted}}>{items.length} item</p>
                  {(hasWarning||hasExpired)&&<div style={{width:7,height:7,borderRadius:"50%",background:hasExpired?C.red:C.yellow,marginTop:4}}/>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Alerts */}
        {[...expired,...expiring].length>0&&(
          <div style={{marginBottom:16}} className="fade-up">
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><Ic.Bell/><h2 style={{fontSize:14,fontWeight:800,color:C.text,margin:0}}>Peringatan Stok</h2></div>
            {[...expired,...expiring].slice(0,4).map(item=>{
              const days=daysDiff(item.expiryDate);
              const st=expStatus(days,warnDays,C);
              return(
                <div key={item.id} style={{background:st.bg,borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",border:`1.5px solid ${st.color}30`,marginBottom:7}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:26}}>{item.photo}</span>
                    <div><p style={{margin:0,fontWeight:700,fontSize:12,color:C.text}}>{item.name}</p><p style={{margin:0,fontSize:11,color:C.muted}}>{item.qty} {item.unit} · {item.section}</p></div>
                  </div>
                  <span style={{background:st.color,color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}>{days<0?"Kadaluarsa":st.label}</span>
                </div>
              );
            })}
          </div>
        )}

        {/* Recipe Carousel */}
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:5}}><Ic.Chef/><h2 style={{fontSize:14,fontWeight:800,color:C.text,margin:0}}>Resep dari Stokmu</h2></div>
            <span style={{fontSize:10,color:C.muted,fontWeight:600}}>{settings.autoScroll&&!manualScroll?"🔄 Auto":"👆 Manual"}</span>
          </div>
          <div ref={carRef} onTouchStart={onCarInteract} onMouseDown={onCarInteract} style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:6,cursor:"grab"}}>
            {RECIPES.map(r=>(
              <div key={r.id} onClick={()=>setSelRecipe(r)} style={{minWidth:150,background:C.card,borderRadius:18,padding:"13px 12px",boxShadow:`0 3px 14px ${C.shadow}`,cursor:"pointer",border:`1.5px solid ${C.border}`,flexShrink:0,transition:"transform .15s,box-shadow .15s"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="none";}}>
                <div style={{fontSize:32,marginBottom:7}}>{r.emoji}</div>
                <p style={{margin:"0 0 2px",fontWeight:800,fontSize:12,color:C.text,lineHeight:1.3}}>{r.name}</p>
                <p style={{margin:"0 0 7px",fontSize:10,color:C.muted}}>{r.time} · {r.diff}</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                  {r.ing.slice(0,2).map(i=><span key={i} style={{background:`${C.navy}12`,borderRadius:20,padding:"2px 7px",fontSize:9,color:C.navy,fontWeight:700}}>{i}</span>)}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Stock grid */}
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <h2 style={{fontSize:14,fontWeight:800,color:C.text,margin:0}}>Stok Tersedia</h2>
            <button onClick={onOpenStorage} style={{background:"none",border:"none",cursor:"pointer",color:C.navyL,fontSize:12,fontWeight:700}}>Lihat Semua →</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {available.slice(0,4).map(item=>{
              const days=daysDiff(item.expiryDate);
              const st=expStatus(days,warnDays,C);
              return(
                <div key={item.id} style={{background:C.card,borderRadius:16,padding:"12px",boxShadow:`0 2px 10px ${C.shadow}`,border:`1.5px solid ${C.border}`}}>
                  <span style={{fontSize:28}}>{item.photo}</span>
                  <p style={{margin:"6px 0 2px",fontWeight:700,fontSize:12,color:C.text,lineHeight:1.3}}>{item.name}</p>
                  <p style={{margin:"0 0 4px",fontSize:11,color:C.muted}}>{item.qty} {item.unit}</p>
                  <span style={{display:"inline-block",background:st.bg,color:st.color,borderRadius:20,padding:"2px 7px",fontSize:10,fontWeight:700}}>{st.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
      {selRecipe&&<RecipeModal recipe={selRecipe} C={C} onClose={()=>setSelRecipe(null)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// SCAN SCREEN
// ═══════════════════════════════════════════════════════════════════
function ScanScreen({stock,setStock,C,settings,sections}){
  const[mode,setMode]=useState(null);
  const[phase,setPhase]=useState("idle");
  const[result,setResult]=useState(null);
  const[img,setImg]=useState(null);
  const[sf,setSf]=useState({qty:1,unit:settings.defUnit||"pcs",expiryDate:"",section:sections[0]||""});
  const[pct,setPct]=useState(0);
  const vidRef=useRef(null);
  const canRef=useRef(null);
  const stmRef=useRef(null);
  const filRef=useRef(null);

  const stopCam=useCallback(()=>{
    if(stmRef.current){stmRef.current.getTracks().forEach(t=>t.stop());stmRef.current=null;}
    setPhase(p=>p==="scanning"?"idle":p);
  },[]);
  useEffect(()=>()=>stopCam(),[stopCam]);

  const startCam=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      stmRef.current=s;if(vidRef.current)vidRef.current.srcObject=s;setPhase("scanning");
    }catch{alert("Kamera butuh HTTPS.\nDeploy ke Netlify untuk mengaktifkan kamera.\nSementara gunakan 'Upload dari Galeri' ✅");}
  };
  const capturePhoto=()=>{
    const cv=canRef.current,vd=vidRef.current;if(!cv||!vd)return;
    cv.width=vd.videoWidth;cv.height=vd.videoHeight;cv.getContext("2d").drawImage(vd,0,0);
    setImg(cv.toDataURL("image/jpeg",.8));stopCam();runAnalyze();
  };
  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{setImg(ev.target.result);runAnalyze();};r.readAsDataURL(f);
  };
  const runAnalyze=()=>{
    setPhase("analyzing");setPct(0);
    const iv=setInterval(()=>setPct(p=>Math.min(p+3,96)),70);
    setTimeout(()=>{clearInterval(iv);setPct(100);setTimeout(()=>{setResult({type:"ai",...randFrom(AI_PRODUCTS)});setPhase("result");},300);},2500);
  };
  const runQR=()=>{
    setPhase("analyzing");setPct(0);
    const iv=setInterval(()=>setPct(p=>Math.min(p+5,96)),55);
    setTimeout(()=>{clearInterval(iv);setPct(100);setTimeout(()=>{setResult({type:"qr",...randFrom(QR_PRODUCTS)});setPhase("result");stopCam();},300);},1800);
  };
  const reset=()=>{setMode(null);setPhase("idle");setResult(null);setImg(null);setSf({qty:1,unit:settings.defUnit||"pcs",expiryDate:"",section:sections[0]||""});setPct(0);stopCam();};
  const save=()=>{
    if(!result||!sf.expiryDate)return;
    setStock(p=>[...p,{id:Date.now(),name:result.name,category:result.cat,qty:sf.qty,unit:sf.unit,storedDate:fmt(NOW),expiryDate:sf.expiryDate,photo:result.emoji||"📦",section:sf.section}]);
    reset();
  };

  const btnP={background:`linear-gradient(135deg,${C.navy},${C.navyL})`,border:"none",borderRadius:14,padding:"14px",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",width:"100%"};
  const btnS={background:`${C.orange}18`,border:`1.5px solid ${C.orange}`,borderRadius:14,padding:"12px",color:C.navy,fontWeight:700,cursor:"pointer",width:"100%"};
  const inp={width:"100%",border:`1.5px solid ${C.border}`,borderRadius:10,padding:"10px 12px",fontSize:14,outline:"none",color:C.text,background:C.card};

  return(
    <div style={{paddingBottom:90,minHeight:"100vh",background:C.bg}}>
      <div style={{background:`linear-gradient(135deg,${C.navy},${C.navyL})`,padding:"52px 18px 22px",borderRadius:"0 0 28px 28px"}}>
        <h2 style={{color:"#fff",margin:0,fontSize:20,fontWeight:900}}>Scan & Tambah</h2>
        <p style={{color:"rgba(255,255,255,.6)",margin:"4px 0 0",fontSize:13}}>Scan QR code atau foto kemasan via AI</p>
      </div>

      <div style={{padding:"18px 14px"}}>
        {!mode&&(<div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
          {[{id:"qr",ic:<Ic.QR/>,t:"Scan QR / Barcode",d:"Scan barcode produk",b:"QR"},{id:"ai",ic:<Ic.Camera/>,t:"Foto Kemasan (AI Vision)",d:"Foto kemasan, AI deteksi otomatis",b:"AI"}].map(o=>(
            <button key={o.id} onClick={()=>setMode(o.id)} style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:18,padding:"16px 18px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14,boxShadow:`0 3px 14px ${C.shadow}`}}>
              <div style={{width:50,height:50,borderRadius:14,background:`linear-gradient(135deg,${C.navyL},${C.navy})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0}}>{o.ic}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><p style={{margin:0,fontWeight:800,fontSize:14,color:C.text}}>{o.t}</p><span style={{background:`${C.orange}22`,color:C.orange,borderRadius:6,padding:"1px 7px",fontSize:10,fontWeight:800}}>{o.b}</span></div>
                <p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>{o.d}</p>
              </div>
              <Ic.Arrow/>
            </button>
          ))}
          <button onClick={()=>setMode("manual")} style={{background:"none",border:`1.5px dashed ${C.border}`,borderRadius:18,padding:"14px",cursor:"pointer",color:C.muted,fontSize:14,fontWeight:700}}>+ Input Manual</button>
        </div>)}

        {mode==="manual"&&<AddEditModal C={C} sections={sections} defUnit={settings.defUnit} onClose={reset} onSave={item=>{setStock(p=>[...p,item]);reset();}}/>}

        {(mode==="qr"||mode==="ai")&&phase!=="result"&&(
          <div className="fade-up">
            <button onClick={reset} style={{background:"none",border:"none",color:C.navyL,fontWeight:700,cursor:"pointer",marginBottom:14,fontSize:13}}>← Kembali</button>
            <div style={{background:"#000",borderRadius:20,overflow:"hidden",marginBottom:14,position:"relative",height:240}}>
              <video ref={vidRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              {phase==="idle"&&<div style={{position:"absolute",inset:0,background:"#0F2557CC",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10}}>
                <div style={{fontSize:40}}>{mode==="qr"?"📷":"🤖"}</div>
                <p style={{color:"#fff",fontWeight:700,margin:0,textAlign:"center",padding:"0 24px",fontSize:13}}>{mode==="qr"?"Arahkan ke QR code / barcode":"AI siap menganalisis kemasan"}</p>
              </div>}
              {phase==="scanning"&&mode==="qr"&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                <div style={{position:"relative",width:170,height:170}}>
                  <div style={{position:"absolute",inset:0,border:`3px solid ${C.orange}`,borderRadius:14,boxShadow:"0 0 0 2000px rgba(0,0,0,.5)"}}/>
                  <div style={{position:"absolute",left:0,right:0,height:2,background:C.orange,top:"50%",animation:"scanLine 1.6s ease-in-out infinite"}}/>
                </div>
              </div>}
              {phase==="analyzing"&&<div style={{position:"absolute",inset:0,background:"#0F2557EE",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
                <div style={{fontSize:36}}>{mode==="qr"?"🔍":"🤖"}</div>
                <p style={{color:"#fff",fontWeight:700,margin:0,fontSize:14}}>Menganalisis... {pct}%</p>
                <div style={{width:160,height:6,background:"rgba(255,255,255,.2)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${C.navyL},${C.orange})`,borderRadius:3,transition:"width .12s"}}/>
                </div>
              </div>}
            </div>
            <canvas ref={canRef} style={{display:"none"}}/>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {phase==="idle"&&<button onClick={startCam} style={btnP}>📷 Aktifkan Kamera</button>}
              {phase==="scanning"&&mode==="ai"&&<button onClick={capturePhoto} style={{...btnP,background:`linear-gradient(135deg,${C.orange},#FBBF47)`}}>📸 Ambil Foto & Analisis</button>}
              {phase==="scanning"&&mode==="qr"&&<button onClick={runQR} style={{...btnP,background:`linear-gradient(135deg,${C.orange},#FBBF47)`}}>🔍 Scan Sekarang (Demo)</button>}
              {phase==="idle"&&mode==="ai"&&<button onClick={()=>filRef.current?.click()} style={btnS}>🖼️ Upload dari Galeri</button>}
              {phase==="scanning"&&<button onClick={stopCam} style={{background:"#FEF2F2",border:"none",borderRadius:14,padding:"12px",color:C.red,fontWeight:700,cursor:"pointer"}}>✕ Stop Kamera</button>}
              <input ref={filRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
            </div>
          </div>
        )}

        {phase==="result"&&result&&(<div className="fade-up">
          <div style={{background:C.card,borderRadius:20,padding:18,marginBottom:14,boxShadow:`0 4px 20px ${C.shadow}`}}>
            {img&&<img src={img} style={{width:"100%",height:150,objectFit:"cover",borderRadius:14,marginBottom:14}} alt="captured"/>}
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
              <span style={{fontSize:44}}>{result.emoji||"📦"}</span>
              <div>
                <p style={{margin:0,fontWeight:800,fontSize:15,color:C.text}}>{result.name}</p>
                {result.brand&&<p style={{margin:"2px 0",fontSize:12,color:C.muted}}>by {result.brand}</p>}
                <span style={{background:`${C.navy}14`,color:C.navy,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>{result.cat}</span>
              </div>
            </div>
            <div style={{background:C.bg,borderRadius:12,padding:"10px 14px"}}>
              <p style={{margin:"0 0 4px",fontSize:12,fontWeight:700,color:C.text}}>💡 Info Penyimpanan</p>
              <p style={{margin:"0 0 4px",fontSize:12,color:C.muted}}>{result.store}</p>
              <p style={{margin:0,fontSize:12,color:C.muted}}>⏰ {result.exp}</p>
            </div>
          </div>
          <div style={{background:C.card,borderRadius:20,padding:18,marginBottom:14}}>
            <h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:C.text}}>Simpan ke Storage</h3>
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              <div style={{flex:1}}><p style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:4}}>Jumlah</p><input type="number" value={sf.qty} min={1} onChange={e=>setSf(p=>({...p,qty:parseFloat(e.target.value)||1}))} style={{...inp,padding:"9px 12px"}}/></div>
              <div style={{flex:1}}><p style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:4}}>Satuan</p><input value={sf.unit} onChange={e=>setSf(p=>({...p,unit:e.target.value}))} style={{...inp,padding:"9px 12px"}}/></div>
            </div>
            {sections.length>0&&<div style={{marginBottom:10}}>
              <p style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:6}}>📍 Sekat Kulkas</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {sections.map(s=><button key={s} onClick={()=>setSf(p=>({...p,section:s}))} style={{background:sf.section===s?`${C.navy}22`:C.card2,border:`1.5px solid ${sf.section===s?C.navy:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700,color:sf.section===s?C.navy:C.muted,cursor:"pointer"}}>{s}</button>)}
              </div>
            </div>}
            <div style={{marginBottom:16}}><p style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:4}}>Tanggal Kadaluarsa *</p><input type="date" value={sf.expiryDate} onChange={e=>setSf(p=>({...p,expiryDate:e.target.value}))} style={{...inp,padding:"9px 12px"}}/></div>
            <button onClick={save} style={btnP}>✓ Simpan ke Storage</button>
          </div>
          <button onClick={reset} style={{width:"100%",background:"none",border:`1.5px solid ${C.border}`,borderRadius:14,padding:"12px",color:C.muted,fontWeight:700,cursor:"pointer"}}>Scan Ulang</button>
        </div>)}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// SETTINGS MODAL
// ═══════════════════════════════════════════════════════════════════
function SettingsModal({settings,setSettings,C,stock,setStock,onClose}){
  const[s,setS]=useState({...settings});
  const save=()=>{setSettings(s);onClose();};
  const tog=k=>setS(p=>({...p,[k]:!p[k]}));
  const pick=(k,v)=>setS(p=>({...p,[k]:v}));
  const THEMES={navy:"🔵 Navy",ocean:"🩵 Ocean",forest:"🟢 Forest",purple:"🟣 Purple",sunset:"🟠 Sunset"};
  const Toggle=({on,onT})=>(
    <div onClick={onT} style={{width:44,height:24,borderRadius:12,background:on?C.orange:C.border,cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
      <div style={{position:"absolute",top:3,left:on?21:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
    </div>
  );
  const Chips=({opts,val,pick:p})=>(
    <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end",maxWidth:220}}>
      {opts.map(o=><button key={o.v} onClick={()=>p(o.v)} style={{background:val===o.v?C.orange:C.card2,border:`1.5px solid ${val===o.v?C.orange:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700,color:val===o.v?"#fff":C.text,cursor:"pointer"}}>{o.l}</button>)}
    </div>
  );
  const Row=({l,sub,r,last})=>(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:last?"none":`1px solid ${C.border}`}}>
      <div><p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>{l}</p>{sub&&<p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>{sub}</p>}</div>
      {r}
    </div>
  );
  const Sec=({title,children})=>(
    <div style={{marginBottom:18}}>
      <p style={{fontSize:11,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:.8,marginBottom:8,paddingLeft:4}}>{title}</p>
      <div style={{background:C.card,borderRadius:16,overflow:"hidden",boxShadow:`0 2px 10px ${C.shadow}`}}>{children}</div>
    </div>
  );
  return(
    <div style={{position:"fixed",inset:0,background:C.overlay,zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div className="slide-up" style={{background:C.bg,borderRadius:"24px 24px 0 0",width:"100%",maxHeight:"93vh",overflowY:"auto"}}>
        <div style={{background:`linear-gradient(135deg,${C.navy},${C.navyL})`,padding:"18px 16px",borderRadius:"24px 24px 0 0",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,color:"#fff"}}><Ic.Settings/><h2 style={{margin:0,fontSize:17,fontWeight:800}}>Setelan</h2></div>
            <button onClick={onClose} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:10,padding:8,cursor:"pointer",color:"#fff"}}><Ic.Close/></button>

        </div>
        <div style={{padding:"14px 14px 100px"}}>
          <Sec title="🎨 Tampilan">

            <Row l="Ukuran Teks" r={<Chips opts={[{v:"small",l:"S"},{v:"medium",l:"M"},{v:"large",l:"L"}]} val={s.textSize} pick={v=>pick("textSize",v)}/>} last/>
          </Sec>
          <Sec title="📋 Stok">
            <Row l="Tampilan Stok" r={<Chips opts={[{v:"grid",l:"▦ Grid"},{v:"list",l:"☰ List"}]} val={s.stockView} pick={v=>pick("stockView",v)}/>}/>
            <Row l="Urutkan" r={<Chips opts={[{v:"exp",l:"📅 Expired"},{v:"name",l:"A-Z"},{v:"cat",l:"🏷️ Kat"}]} val={s.sortBy} pick={v=>pick("sortBy",v)}/>}/>
            <Row l="Batas Peringatan" sub="Hari sebelum kadaluarsa" r={<Chips opts={[{v:3,l:"3"},{v:5,l:"5"},{v:7,l:"7"},{v:14,l:"14"}]} val={s.warnDays} pick={v=>pick("warnDays",v)}/>}/>
            <Row l="Satuan Default" r={<Chips opts={[{v:"pcs",l:"pcs"},{v:"kg",l:"kg"},{v:"liter",l:"ltr"},{v:"buah",l:"buah"}]} val={s.defUnit} pick={v=>pick("defUnit",v)}/>}/>
            <Row l="Badge Kadaluarsa" sub="Warna status di kartu stok" r={<Toggle on={s.showExpBadge} onT={()=>tog("showExpBadge")}/>} last/>
          </Sec>
          <Sec title="🎠 Resep">
            <Row l="Auto-scroll Carousel" sub="Scroll otomatis kartu resep" r={<Toggle on={s.autoScroll} onT={()=>tog("autoScroll")}/>}/>
            <Row l="Kecepatan Scroll" r={<Chips opts={[{v:"slow",l:"Lambat"},{v:"medium",l:"Normal"},{v:"fast",l:"Cepat"}]} val={s.scrollSpeed} pick={v=>pick("scrollSpeed",v)}/>} last/>
          </Sec>
          <Sec title="🔔 Notifikasi">
            <Row l="Aktifkan Notifikasi" sub="Peringatan kadaluarsa" r={<Toggle on={s.notifEnabled} onT={()=>tog("notifEnabled")}/>}/>
            <Row l="Tampilan Kompak" sub="Kartu stok lebih padat" r={<Toggle on={s.compactView} onT={()=>tog("compactView")}/>} last/>
          </Sec>
          <Sec title="⚠️ Data">
            <Row l="Reset Stok" sub="Hapus semua data stok" r={<button onClick={()=>{if(window.confirm("Reset semua stok?"))setStock(SEED_STOCK);}} style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,padding:"6px 12px",color:C.red,fontSize:12,fontWeight:700,cursor:"pointer"}}>Reset</button>} last/>
          </Sec>
          <button onClick={save} style={{width:"100%",background:`linear-gradient(135deg,${C.navy},${C.navyL})`,border:"none",borderRadius:14,padding:"14px",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer"}}>✓ Simpan Setelan</button>
        </div>
      </div>
    </div>
  );
}

// CHATBOT MODAL
// ═══════════════════════════════════════════════════════════════════
function ChatbotModal({C,stock,onClose}){
  const[msgs,setMsgs]=useState([{role:"assistant",text:"Halo! Saya SmartSavior AI 🤖\n\nSaya bisa bantu:\n• Resep dari bahan yang kamu punya\n• Tips penyimpanan makanan\n• Pertanyaan seputar kulkas & stok\n\nMau tanya apa? 😊"}]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  const send=async()=>{
    if(!input.trim()||loading)return;
    const q=input.trim();setInput("");
    setMsgs(p=>[...p,{role:"user",text:q}]);
    setLoading(true);
    const stockCtx=stock.slice(0,8).map(i=>`${i.name} (${i.qty}${i.unit}, exp:${i.expiryDate})`).join(", ");
    try{
      const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:`Kamu adalah SmartSavior AI, asisten cerdas manajemen kulkas dan dapur. Jawab dalam Bahasa Indonesia yang ramah dan singkat (max 150 kata). Stok kulkas user saat ini: ${stockCtx||"belum ada stok"}. Fokus pada topik: resep masakan, tips penyimpanan, pengelolaan stok makanan.`,messages:[...msgs.filter(m=>m.role!=="assistant"||msgs.indexOf(m)>0).map(m=>({role:m.role,content:m.text})),{role:"user",content:q}]})});
      const d=await res.json();
      const ans=d.content?.[0]?.text||"Maaf, ada gangguan. Coba lagi ya!";
      setMsgs(p=>[...p,{role:"assistant",text:ans}]);
    }catch{setMsgs(p=>[...p,{role:"assistant",text:"Maaf, koneksi terganggu. Coba lagi sebentar ya! 🙏"}]);}
    setLoading(false);
  };

  return(
    <div style={{position:"fixed",inset:0,background:C.overlay,zIndex:300,display:"flex",alignItems:"flex-end"}}>
      <div className="slide-up" style={{background:C.card,borderRadius:"24px 24px 0 0",width:"100%",height:"80vh",display:"flex",flexDirection:"column"}}>
        {/* Header */}
        <div style={{background:`linear-gradient(135deg,${C.navy},${C.navyL})`,padding:"16px 18px",borderRadius:"24px 24px 0 0",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{width:40,height:40,borderRadius:"50%",background:"rgba(255,255,255,.18)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🤖</div>
          <div style={{flex:1}}>
            <h3 style={{color:"#fff",margin:0,fontSize:15,fontWeight:800}}>SmartSavior AI</h3>
            <p style={{color:"rgba(255,255,255,.6)",margin:0,fontSize:11}}>Asisten dapur cerdasmu</p>
          </div>
          <div style={{display:"flex",gap:8}}>
            <a href={`https://wa.me/${WA_ADMIN}`} target="_blank" rel="noreferrer" style={{background:"#25D366",border:"none",borderRadius:10,padding:"7px 12px",color:"#fff",fontWeight:700,fontSize:11,textDecoration:"none",display:"flex",alignItems:"center",gap:4}}><Ic.WA/> Admin</a>
            <button onClick={onClose} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:10,padding:8,cursor:"pointer",color:"#fff"}}><Ic.Close/></button>
          </div>
        </div>

        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 14px",display:"flex",flexDirection:"column",gap:12,background:C.bg}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8}}>
              {m.role==="assistant"&&<div style={{width:30,height:30,borderRadius:"50%",background:`${C.navy}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>🤖</div>}
              <div style={{maxWidth:"78%",background:m.role==="user"?`linear-gradient(135deg,${C.navy},${C.navyL})`:`${C.navy}12`,borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",color:m.role==="user"?"#fff":C.text,fontSize:13,lineHeight:1.5,whiteSpace:"pre-wrap"}}>
                {m.text}
              </div>
            </div>
          ))}
          {loading&&(
            <div style={{display:"flex",gap:8}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:`${C.navy}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🤖</div>
              <div style={{background:`${C.navy}12`,borderRadius:"18px 18px 18px 4px",padding:"10px 16px",display:"flex",gap:4,alignItems:"center"}}>
                {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:C.navy,animation:`pulse .8s ${i*.15}s infinite`}}/>)}
              </div>
            </div>
          )}
          <div ref={bottomRef}/>
        </div>

        {/* Input */}
        <div style={{padding:"12px 14px 24px",background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",gap:8,flexShrink:0}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Tanya tentang resep, stok, penyimpanan..." style={{flex:1,border:`1.5px solid ${C.border}`,borderRadius:14,padding:"10px 14px",fontSize:13,outline:"none",color:C.text,background:C.bg}}/>
          <button onClick={send} disabled={loading||!input.trim()} style={{background:input.trim()?`linear-gradient(135deg,${C.navy},${C.navyL})`:`${C.navy}40`,border:"none",borderRadius:14,padding:"10px 14px",color:"#fff",cursor:input.trim()?"pointer":"not-allowed"}}><Ic.Send/></button>
        </div>
      </div>
    </div>
  );
}

// PROFILE SCREEN
// ═══════════════════════════════════════════════════════════════════
function ProfileScreen({user,setUser,C,onLogout,onShowChat}){
  const[editing,setEditing]=useState(false);
  const[eu,setEu]=useState({...user});
  const[openFaq,setOpenFaq]=useState(null);
  const photoRef=useRef(null);
  const ePRef=useRef(null);
  const age=calcAge(user.dob);

  const saveUser=()=>{
    const users=SS.get("ss_users",[]);
    const updated=users.map(u=>u.username===user.username?{...u,...eu}:u);
    SS.set("ss_users",updated);
    SS.set("ss_current_user",eu.username);
    setUser(eu);setEditing(false);
  };
  const handlePhoto=(e,isEdit)=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      if(isEdit)setEu(u=>({...u,photo:ev.target.result}));
      else{
        const nu={...user,photo:ev.target.result};
        const users=SS.get("ss_users",[]);
        SS.set("ss_users",users.map(u=>u.username===user.username?{...u,photo:ev.target.result}:u));
        setUser(nu);
      }
    };r.readAsDataURL(f);
  };
  const fmtDob=d=>{if(!d)return"-";try{return new Date(d).toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});}catch{return d;}};
  const inp={width:"100%",border:`1.5px solid ${C.border}`,borderRadius:12,padding:"10px 14px",fontSize:14,outline:"none",color:C.text,background:C.card};
  const FAQS=[
    {q:"Bagaimana cara kerja AI Scan?",a:"AI Scan menganalisis foto kemasan produk secara otomatis. Sistem mengidentifikasi nama, merek, kategori, dan saran penyimpanan."},
    {q:"Kenapa kamera tidak bisa diakses?",a:"Kamera membutuhkan koneksi HTTPS. Buka via link Netlify (bukan dari file lokal) agar kamera aktif."},
    {q:"Apakah data tersimpan permanen?",a:"Ya! Data disimpan di browser via localStorage. Tetap ada selama kamu tidak clear cache browser."},
    {q:"Bagaimana sistem peringatan kadaluarsa?",a:"Sistem menghitung mundur setiap hari. Batas peringatan bisa diatur di Setelan (3-14 hari). Hijau = aman, Kuning = mendekati, Merah = kritis."},
    {q:"Apa itu sekat kulkas?",a:"Fitur sekat membantu kamu mengetahui item ada di bagian mana di kulkas — freezer, rak atas, laci sayuran, dll. Sesuai jenis kulkasmu."},
    {q:"Cara ganti bahasa atau tema?",a:"Buka Setelan (ikon gear di halaman Home). Tersedia pilihan tema warna, mode gelap, dan berbagai preferensi lainnya."},
    {q:"Bisa untuk bisnis UMKM?",a:"Tentu! Cocok untuk warteg, kantin, catering, dan bisnis kuliner kecil yang butuh sistem pelacakan stok sederhana."},
  ];

  return(
    <div style={{paddingBottom:90,minHeight:"100vh",background:C.bg}}>
      {/* Header */}
      <div style={{background:`linear-gradient(150deg,${C.navy},${C.navyL})`,padding:"52px 18px 26px",borderRadius:"0 0 30px 30px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,right:-30,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,.05)"}}/>
        <div style={{display:"flex",alignItems:"flex-start",gap:14}}>
          <div style={{position:"relative",cursor:"pointer",flexShrink:0}} onClick={()=>photoRef.current?.click()}>
            {user.photo
              ?<img src={user.photo} style={{width:74,height:74,borderRadius:"50%",objectFit:"cover",border:"3px solid rgba(255,255,255,.5)"}} alt="foto"/>
              :<div style={{width:74,height:74,borderRadius:"50%",background:"rgba(255,255,255,.18)",border:"3px solid rgba(255,255,255,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:34}}>👤</div>
            }
            <div style={{position:"absolute",bottom:2,right:2,width:22,height:22,borderRadius:"50%",background:C.orange,border:"2px solid #fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>📷</div>
            <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handlePhoto(e,false)}/>
          </div>
          <div style={{flex:1}}>
            <h2 style={{color:"#fff",margin:0,fontSize:19,fontWeight:900,lineHeight:1.1}}>{user.name}</h2>
            <p style={{color:"rgba(255,255,255,.6)",margin:"2px 0",fontSize:12}}>@{user.username}</p>
            <div style={{display:"flex",gap:7,marginTop:6,flexWrap:"wrap"}}>
              {age&&<span style={{background:"rgba(255,255,255,.18)",color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>🎂 {age} tahun</span>}
              <span style={{background:"rgba(255,255,255,.14)",color:"rgba(255,255,255,.85)",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600}}>🧊 Kulkas {FRIDGE_TYPES[user.fridgeType||"2"]?.label}</span>
            </div>
          </div>
          <button onClick={()=>{setEu({...user});setEditing(true);}} style={{background:"rgba(255,255,255,.18)",border:"1.5px solid rgba(255,255,255,.3)",borderRadius:10,padding:"7px 12px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>Edit</button>

        {/* Info card */}
        <div style={{background:C.card,borderRadius:16,overflow:"hidden",marginBottom:14,boxShadow:`0 2px 10px ${C.shadow}`}}>
          {[["📱 Nomor HP",user.phone||"-"],["📧 Email",user.email||"-"],["🎂 Tanggal Lahir",fmtDob(user.dob)],["👤 Usia",age?`${age} tahun`:"-"],["🧊 Jenis Kulkas",FRIDGE_TYPES[user.fridgeType||"2"]?.label||"-"]].map(([l,v],i,arr)=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 16px",borderBottom:i<arr.length-1?`1px solid ${C.border}`:"none"}}>

              <span style={{fontSize:13,color:C.text,fontWeight:700,maxWidth:"55%",textAlign:"right",wordBreak:"break-all"}}>{v}</span>
            </div>

        </div>

        {/* Chat buttons */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <button onClick={onShowChat} style={{background:`linear-gradient(135deg,${C.navy},${C.navyL})`,border:"none",borderRadius:14,padding:"13px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
            <Ic.Bot/> AI Chatbot
          </button>
          <a href={`https://wa.me/${WA_ADMIN}`} target="_blank" rel="noreferrer" style={{background:"linear-gradient(135deg,#128C7E,#25D366)",border:"none",borderRadius:14,padding:"13px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,textDecoration:"none"}}>
            <Ic.WA/> Chat Admin
          </a>
        </div>

        {/* About */}
        <div style={{background:`linear-gradient(135deg,${C.navy}0A,${C.orange}12)`,border:`1.5px solid ${C.border}`,borderRadius:18,padding:"16px",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>

          ))}
        </div>

        <button onClick={onLogout} style={{width:"100%",background:"#FEF2F2",border:"1.5px solid #FECACA",borderRadius:14,padding:"13px",color:C.red,fontWeight:800,fontSize:14,cursor:"pointer",marginBottom:24,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <Ic.Logout/> Logout

      {/* Edit Modal */}

                  <span style={{fontSize:22}}>{v.emoji}</span>
                  <div style={{flex:1}}><p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>{v.label}</p><p style={{margin:0,fontSize:11,color:C.muted}}>{v.desc}</p></div>
                  {eu.fridgeType===k&&<div style={{color:C.orange}}><Ic.Check/></div>}
                </button>
              ))}
            </div>
            <button onClick={saveUser} style={{width:"100%",background:`linear-gradient(135deg,${C.navy},${C.navyL})`,border:"none",borderRadius:14,padding:"14px",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer"}}>Simpan Perubahan ✓</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════
const DEF_SETTINGS={darkMode:false,theme:"navy",warnDays:7,stockView:"grid",sortBy:"exp",textSize:"medium",autoScroll:true,scrollSpeed:"medium",defUnit:"pcs",showExpBadge:true,notifEnabled:true,compactView:false};

function MainApp({user,setUser,onLogout}){
  const[tab,setTab]=useState("home");
  const[stock,setStock]=useState(()=>{
    const k=`ss_stock_${user.username}`;
    return SS.get(k,SEED_STOCK);
  });
  const[settings,setSettings]=useState(()=>SS.get(`ss_settings_${user.username}`,DEF_SETTINGS));
  const[showStorage,setShowStorage]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[showChat,setShowChat]=useState(false);

  useEffect(()=>{SS.set(`ss_stock_${user.username}`,stock);},[stock,user.username]);
  useEffect(()=>{SS.set(`ss_settings_${user.username}`,settings);},[settings,user.username]);

  const C=makeC(settings.darkMode,settings.theme);
  const sections=FRIDGE_TYPES[user.fridgeType||"2"]?.sections||FRIDGE_TYPES["2"].sections;

  return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.bg,position:"relative",overflow:"hidden",fontSize:settings.textSize==="small"?"12px":settings.textSize==="large"?"16px":"14px"}}>
      <style>{`
        *{box-sizing:border-box}
        ::-webkit-scrollbar{display:none}
        input,button,select{font-family:inherit}
        @keyframes scanLine{0%,100%{top:5%}50%{top:88%}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.08)}}
      `}</style>

      {tab==="home"&&<HomeScreen stock={stock} user={user} settings={settings} C={C} sections={sections} onOpenStorage={()=>setShowStorage(true)} onOpenSettings={()=>setShowSettings(true)} onGoProfile={()=>setTab("profile")}/>}
      {tab==="scan"&&<ScanScreen stock={stock} setStock={setStock} C={C} settings={settings} sections={sections}/>}
      {tab==="profile"&&<ProfileScreen user={user} setUser={setUser} C={C} onLogout={onLogout} onShowChat={()=>setShowChat(true)}/>}

      <BottomNav active={tab} setActive={setTab} C={C} showChat={showChat} setShowChat={setShowChat}/>

      {showStorage&&<StorageModal stock={stock} setStock={setStock} C={C} settings={settings} sections={sections} onClose={()=>setShowStorage(false)}/>}
      {showSettings&&<SettingsModal settings={settings} setSettings={setSettings} C={C} stock={stock} setStock={setStock} onClose={()=>setShowSettings(false)}/>}
      {showChat&&<ChatbotModal C={C} stock={stock} onClose={()=>setShowChat(false)}/>}

      {/* Floating Chat Button */}
      {!showChat&&tab==="home"&&(
        <button onClick={()=>setShowChat(true)} style={{position:"fixed",bottom:90,right:16,width:50,height:50,borderRadius:"50%",background:`linear-gradient(135deg,${C.navy},${C.navyL})`,border:"none",cursor:"pointer",boxShadow:`0 4px 16px ${C.navy}60`,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}}>
          <Ic.Bot/>
        </button>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════
function App(){
  const[appState,setAppState]=useState("splash"); // splash | auth | onboarding | main
  const[currentUser,setCurrentUser]=useState(null);

  useEffect(()=>{
    // Check if already logged in
    const username=SS.get("ss_current_user");
    if(username){
      const users=SS.get("ss_users",[]);
      const user=users.find(u=>u.username===username);
      if(user){setCurrentUser(user);setAppState(user.onboardingDone?"main":"onboarding");}
    }
  },[]);

  const handleLogin=(user)=>{
    setCurrentUser(user);
    setAppState(user.onboardingDone?"main":"onboarding");
  };

  const handleOnboardingDone=(data)=>{
    const users=SS.get("ss_users",[]);
    const updated={...currentUser,...data,onboardingDone:true};
    SS.set("ss_users",users.map(u=>u.username===currentUser.username?updated:u));
    setCurrentUser(updated);
    setAppState("main");
  };

  const handleLogout=()=>{
    if(!window.confirm("Yakin mau logout?"))return;
    SS.del("ss_current_user");
    setCurrentUser(null);
    setAppState("auth");
  };

  const updateUser=(u)=>{
    setCurrentUser(u);
    const users=SS.get("ss_users",[]);
    SS.set("ss_users",users.map(x=>x.username===u.username?u:x));
  };

  if(appState==="splash")return <SplashScreen onDone={()=>{const u=SS.get("ss_current_user");if(u){const users=SS.get("ss_users",[]);const usr=users.find(x=>x.username===u);if(usr){setCurrentUser(usr);setAppState(usr.onboardingDone?"main":"onboarding");return;}}setAppState("auth");}}/>;
  if(appState==="auth")return <AuthScreen onLogin={handleLogin}/>;
  if(appState==="onboarding"&&currentUser)return <OnboardingScreen user={currentUser} onDone={handleOnboardingDone}/>;
  if(appState==="main"&&currentUser)return <MainApp user={currentUser} setUser={updateUser} onLogout={handleLogout}/>;
  return null;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
